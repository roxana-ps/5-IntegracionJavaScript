<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estructura HTML con carpetas organizadas</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <!-- <head>: Contiene información de la página (metadatos, título, etc.) -->

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script> src = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/ dist/js/bootstrap.bundle.min.js"</script>

</head>

<body>
    <!-- <body>: Contiene todo el contenido visible de la página -->
    <header>
        <!-- <header>: Encabezado principal de la página -->
        <h1>Tienda de artículos para mascotas</h1>
    </header>

    <section>
        <!-- <section>: Agrupa contenido relacionado en la página -->

        <article>
            <!-- <article>: Contenido independiente -->
            <h2>MundoMascotas</h2>
            <p>Bienvenid@ a la Tienda de artículos para mascotas onLine</p>
            <img src="assets/img/shiba-inu.jpeg" alt="Imagen Perro Shiva Inu">
            <img src="assets/img/perrodos.jpg" alt="Imagen perro">
            <img src="assets/img/perro3.jpg" alt="Imagen otro perro">
        </article>

    </section>

    <aside>
        <!-- <aside>: Contenido complementario -->
        <h1>Aside</h1>
        <p>Explora todas nuestras secciones</p>
    </aside>

    <div>
        <button id="btnTop">Ir arriba</button>
    </div>


    <footer>
        <!-- <footer>: Pie de página -->
        <p>2025 Tienda de artículos para mascotas - Todos los derechos reservados</p>
    </footer>

    <!-- JavaScript -->
    <script src="assets/js/app.js"></script>
</body>

</html>
